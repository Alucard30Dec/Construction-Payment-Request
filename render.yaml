services:
  - type: web
    name: construction-payment-request
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseProvider
        value: MySql
      - key: Database__AllowSqliteFallbackInDevelopment
        value: "false"
      - key: Database__SeedDemoData
        value: "false"
      - key: ConnectionStrings__MySqlConnection
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: ConstructionPayment.Api
      - key: Jwt__Audience
        value: ConstructionPayment.Frontend
      - key: Cors__AllowedOrigins__0
        value: https://construction-payment-request.onrender.com
      - key: Storage__UploadPath
        value: /tmp/cpms-uploads
