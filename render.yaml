services:
  - type: web
    name: cpms-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseProvider
        value: MySql
      - key: Database__AllowSqliteFallbackInDevelopment
        value: "false"
      - key: Database__SeedDemoData
        value: "true"
      - key: ConnectionStrings__MySqlConnection
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: ConstructionPayment.Api
      - key: Jwt__Audience
        value: ConstructionPayment.Frontend
      - key: Cors__AllowedOrigins__0
        value: https://cpms-web.onrender.com
      - key: Storage__UploadPath
        value: /tmp/cpms-uploads

  - type: web
    name: cpms-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://cpms-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
